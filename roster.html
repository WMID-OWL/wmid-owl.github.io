<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Roster | OWL Wrestling</title>

    <link
        rel="stylesheet"
        href="css/style.css"
    >

    <link
        rel="stylesheet"
        href="css/roster.css"
    >

</head>


<body>


<header class="site-header">

    <a class="brand" href="index.html">

        <span class="brand-mark">
            OWL
        </span>

        <span class="brand-sub">
            WRESTLING
        </span>

    </a>


    <button
        class="nav-toggle"
        aria-label="Toggle navigation"
    >
        ☰
    </button>


    <nav class="site-nav">

        <a href="index.html">
            Home
        </a>

        <a href="roster.html">
            Roster
        </a>

        <a href="champions.html">
            Champions
        </a>

        <a href="events.html">
            Events
        </a>

        <a href="records.html">
            Records
        </a>

    </nav>

</header>



<main>


    <!-- PAGE HEADER -->

    <!-- ROSTER SEARCH AND FILTERS -->

<section class="roster-controls">

    <div class="roster-search-area">

        <label for="roster-search">
            SEARCH THE ROSTER
        </label>

        <input
            type="search"
            id="roster-search"
            placeholder="Search wrestler, hometown, team, faction..."
            autocomplete="off"
        >

    </div>


    <div
        class="roster-filter-bar"
        aria-label="Roster filters"
    >

        <button
            type="button"
            class="roster-filter is-active"
            data-filter="all"
        >
            All
        </button>

        <button
            type="button"
            class="roster-filter"
            data-filter="ascension"
        >
            Ascension
        </button>

        <button
            type="button"
            class="roster-filter"
            data-filter="revolt"
        >
            Revolt
        </button>

        <button
            type="button"
            class="roster-filter"
            data-filter="men"
        >
            Men
        </button>

        <button
            type="button"
            class="roster-filter"
            data-filter="women"
        >
            Women
        </button>

        <button
            type="button"
            class="roster-filter"
            data-filter="tag-teams"
        >
            Tag Teams
        </button>

        <button
            type="button"
            class="roster-filter"
            data-filter="factions"
        >
            Factions
        </button>

    </div>


    <p
        id="roster-empty-state"
        class="roster-empty-state"
        hidden
    >
        No wrestlers match this search.
    </p>

</section>



    <!-- ASCENSION -->

    <section
        class="section"
        id="ascension"
    >

        <div class="section-heading">

            <div>

                <p class="eyebrow">
                    BRAND ROSTER
                </p>

                <h2>
                    Ascension
                </h2>

            </div>

        </div>


        <div
            id="ascension-roster"
            class="roster-grid"
        >
        </div>

    </section>



    <!-- REVOLT -->

    <section
        class="section"
        id="revolt"
    >

        <div class="section-heading">

            <div>

                <p class="eyebrow">
                    BRAND ROSTER
                </p>

                <h2>
                    Revolt
                </h2>

            </div>

        </div>


        <div
            id="revolt-roster"
            class="roster-grid"
        >
        </div>

    </section>



    <!-- UNASSIGNED -->

    <section
        class="section"
        id="unassigned-section"
        hidden
    >

        <div class="section-heading">

            <div>

                <p class="eyebrow">
                    OWL DATABASE
                </p>

                <h2>
                    Unassigned
                </h2>

            </div>

        </div>


        <div
            id="unassigned-roster"
            class="roster-grid"
        >
        </div>

    </section>


</main>



<footer class="site-footer">

    <div>

        <strong>
            OWL Wrestling
        </strong>

        <p>
            Ascension. Revolt. One world.
        </p>

    </div>

</footer>



<script src="js/app.js"></script>

<script src="js/roster.js"></script>


</body>

</html>
