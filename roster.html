<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Roster | OWL Wrestling</title>

    <link
    rel="stylesheet"
    href="css/style.css?v=global-nav-1"
>

    <link
    rel="stylesheet"
    href="css/roster.css?v=division-hidden-fix-1"
>

</head>


<body>


<header class="site-header">

    <a class="brand" href="index.html">

        <span class="brand-mark">
            OWL
        </span>

        <span class="brand-sub">
            WRESTLING
        </span>

    </a>


    <button
        class="nav-toggle"
        aria-label="Toggle navigation"
    >
        ☰
    </button>


    <nav class="site-nav">

    <a href="index.html">
        Home
    </a>

    <a
    href="roster.html"
    class="active"
>
    Roster
</a>

    <a href="groups.html">
        Teams
    </a>

    <a href="champions.html">
        Champions
    </a>

    <a href="events.html">
        Events
    </a>

    <a href="shows.html">
        Shows
    </a>

    <a href="power-rankings.html">
        Power Rankings
    </a>

    <a href="landscape.html">
        The Landscape
    </a>

    <a href="owl-social.html">
        OWL Social
    </a>

    <a href="records.html">
        Cagematch.owl
    </a>

</nav>

</header>



<main>


    <!-- PAGE HEADER -->

    <!-- ROSTER SEARCH AND FILTERS -->

<section class="roster-controls">

    <div class="roster-search-area">

        <label for="roster-search">
            SEARCH THE ROSTER
        </label>

        <input
            type="search"
            id="roster-search"
            placeholder="Search wrestler, hometown, team, faction..."
            autocomplete="off"
        >

    </div>


        <div
        class="roster-filter-bar roster-brand-filter-bar"
        aria-label="Select an OWL brand"
    >

        <button
            type="button"
            class="roster-filter roster-brand-filter active"
            data-brand="ascension"
        >
            Ascension
        </button>

        <button
            type="button"
            class="roster-filter roster-brand-filter"
            data-brand="revolt"
        >
            Revolt
        </button>

    </div>


    <div
        class="roster-filter-bar roster-category-filter-bar"
        aria-label="Select a roster category"
    >

        <button
            type="button"
            class="roster-filter roster-category-filter active"
            data-category="men"
        >
            Men
        </button>

        <button
            type="button"
            class="roster-filter roster-category-filter"
            data-category="women"
        >
            Women
        </button>

        <button
            type="button"
            class="roster-filter roster-category-filter"
            data-category="tag-teams"
        >
            Tag Teams
        </button>

        <button
            type="button"
            class="roster-filter roster-category-filter"
            data-category="factions"
        >
            Factions
        </button>

    </div>
    
    <p
        id="roster-empty-state"
        class="roster-empty-state"
        hidden
    >
        No wrestlers match this search.
    </p>

</section>


<nav
    id="roster-alphabet-nav"
    class="roster-alphabet-nav"
    aria-label="Jump to roster letter"
>
</nav>



    <!-- ASCENSION -->

    <section
        class="section"
        id="ascension"
    >

        <div class="section-heading">

            <div>

                <p class="eyebrow">
                    BRAND ROSTER
                </p>

                <h2>
                    Ascension
                </h2>

            </div>

        </div>


        <div
            id="ascension-roster"
            class="roster-grid"
        >
        </div>

    </section>



    <!-- REVOLT -->

    <section
        class="section"
        id="revolt"
    >

        <div class="section-heading">

            <div>

                <p class="eyebrow">
                    BRAND ROSTER
                </p>

                <h2>
                    Revolt
                </h2>

            </div>

        </div>


        <div
            id="revolt-roster"
            class="roster-grid"
        >
        </div>

    </section>


</main>



<footer class="site-footer">

    <div>

        <strong>
            OWL Wrestling
        </strong>

        <p>
            Ascension. Revolt. One world.
        </p>

    </div>

</footer>



<script src="js/app.js"></script>

<script src="js/roster.js?v=alphabet-cleanup-1"></script>

</body>

</html>
