name: Build Landscape Pulse Context

on:
  workflow_dispatch:
    inputs:
      test_period:
        description: "Optional published period to rebuild for validation"
        required: false
        default: ""
        type: string

  push:
    branches:
      - main
    paths:
      - "data/landscape/companies.json"
      - "data/landscape/shows.json"
      - "data/landscape/events.json"
      - "data/landscape/rankings.json"
      - "data/landscape/championships.json"
      - "data/landscape/championship-history.json"
      - "data/landscape/awards.json"
      - "data/landscape/bragging-rights.json"
      - "data/innanet/accounts.json"
      - "data/innanet/archive-index.json"
      - "scripts/build-landscape-pulse-context.mjs"

permissions:
  contents: write

jobs:
  build-pulse-context:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build Landscape Pulse context
        env:
          LANDSCAPE_PULSE_FORCE_PERIOD: "${{ inputs.test_period }}"
        run: |
          node scripts/build-landscape-pulse-context.mjs

      - name: Commit updated Landscape Pulse queue
        run: |
          if git diff --quiet; then
            echo "No Landscape Pulse context changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add data/innanet/landscape-pulse-queue.json

          git commit \
            -m "Update Landscape Industry Pulse context"

          git push
