name: Build Innanet Context


on:

  workflow_dispatch:


  push:

    branches:
      - main

    paths:
      - "data/matches.json"
      - "data/segments.json"
      - "data/announced-matches.json"
      - "data/events.json"
      - "data/wrestlers.json"
      - "data/teams.json"
      - "data/championships.json"
      - "data/title-reigns.json"
      - "data/innanet/accounts.json"
      - "data/innanet/archive-index.json"
      - "data/wwow/archive-index.json"
      - "scripts/build-innanet-context.mjs"


permissions:

  contents: write


jobs:

  build-context:

    runs-on:
      ubuntu-latest


    steps:


      - name: Check out repository

        uses:
          actions/checkout@v4



      - name: Set up Node

        uses:
          actions/setup-node@v4

        with:

          node-version:
            "20"



      - name: Build Innanet generation context

        run: |

          node scripts/build-innanet-context.mjs



      - name: Commit updated generation queue

        run: |

          if git diff --quiet; then

            echo "No Innanet context changes to commit."

            exit 0

          fi


          git config user.name "github-actions[bot]"

          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"


          git add data/innanet/generation-queue.json


          git commit \
            -m "Update Innanet generation context"


          git push
