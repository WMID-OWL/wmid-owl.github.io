name: Generate WWoW Issue


on:

  workflow_run:

    workflows:

      - Generate Innanet Posts

    types:

      - completed


  workflow_dispatch:

    inputs:

      target_month:

        description:
          "Optional month to publish in YYYY-MM format"

        required:
          false

        default:
          ""



permissions:

  contents:
    write

  models:
    read



concurrency:

  group:
    wwow-writer

  cancel-in-progress:
    false



jobs:

  generate-issue:

    if: >

      github.event_name == 'workflow_dispatch'

      ||

      github.event.workflow_run.conclusion == 'success'


    runs-on:
      ubuntu-latest


    steps:


      - name: Check out repository

        uses:
          actions/checkout@v4

        with:

          ref:
            main



      - name: Set up Node

        uses:
          actions/setup-node@v4

        with:

          node-version:
            "20"



      - name: Determine WWoW publication month

        id:
          publication

        env:

          MANUAL_TARGET_MONTH:
            ${{ github.event_name == 'workflow_dispatch' && inputs.target_month || '' }}


        run: |

          node scripts/find-wwow-publication-month.mjs



      - name: Build WWoW monthly context

        if: >

          steps.publication.outputs.should_publish == 'true'

        env:

          TARGET_MONTH:
            ${{ steps.publication.outputs.target_month }}


        run: |

          node scripts/build-wwow-context.mjs



      - name: Generate WWoW issue

        if: >

          steps.publication.outputs.should_publish == 'true'

        env:

          GITHUB_TOKEN:
            ${{ secrets.GITHUB_TOKEN }}

          
          WWOW_MODEL: openai/gpt-4o-mini

          WWOW_REQUEST_GAP_MS: "30000"


        run: |

          node scripts/write-wwow-issue.mjs



      - name: Build frozen monthly world snapshot

        if: >

          steps.publication.outputs.should_publish == 'true'

        env:

          TARGET_MONTH:
            ${{ steps.publication.outputs.target_month }}

          ALLOW_REBUILD:
            "false"


        run: |

          node scripts/build-monthly-snapshot.mjs



      - name: Commit WWoW issue and world snapshot

        if: >

          steps.publication.outputs.should_publish == 'true'

        run: |

          git add data/wwow

          git add data/history


          if git diff --cached --quiet; then

            echo "No WWoW or world snapshot changes to commit."

            exit 0

          fi


          git config user.name "github-actions[bot]"

          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"


          git commit \
            -m "Publish WWoW issue and monthly world snapshot"


          git push
