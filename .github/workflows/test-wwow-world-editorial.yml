name: Test WWoW World Editorial


on:

  workflow_dispatch:


permissions:

  contents:
    write

  models:
    read


jobs:

  test-world-editorial:

    runs-on: ubuntu-latest


    steps:

      - name: Check out repository

        uses: actions/checkout@v4

        with:

          ref: main


      - name: Set up Node

        uses: actions/setup-node@v4

        with:

          node-version: "20"


      - name: Check test runner syntax

        run: |

          node --check scripts/test-wwow-world-editorial.mjs


      - name: Generate controlled WWoW editorial plan

        env:

          GITHUB_TOKEN:
            ${{ secrets.GITHUB_TOKEN }}

          WWOW_TEST_MODEL:
            openai/gpt-4o-mini

        run: |

          node scripts/test-wwow-world-editorial.mjs


      - name: Commit editorial test plan

        run: |

          git add data/wwow/editorial-test-plan.json


          if git diff --cached --quiet; then

            echo "No WWoW editorial test changes to commit."

            exit 0

          fi


          git config user.name "github-actions[bot]"

          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"


          git commit \
            -m "Update WWoW world editorial test plan"


          git push
